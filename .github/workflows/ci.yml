name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt 2>/dev/null || pip install pytest httpx fastapi uvicorn sqlalchemy psycopg2-binary docker pydantic

    - name: Run tests (exclude chaos)
      run: |
        python -m pytest tests/ -m "not chaos" -v --tb=short

    - name: Run chaos tests (with Docker)
      if: runner.os == 'linux'
      run: |
        python -m pytest tests/ -m chaos -v --tb=short || echo "Chaos tests may fail without Docker"
