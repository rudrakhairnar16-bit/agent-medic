version: "3.8"

networks:
  signoz-net:
    driver: bridge

services:
  signoz:
    image: signoz/foundry:latest
    command: signoz start
    networks: [signoz-net]
    ports:
      - "3301:3301"
      - "4318:4318"
      - "4317:4317"
    volumes:
      - signoz-data:/var/lib/signoz
      - ./casting.yaml:/etc/signoz/casting.yaml
    restart: unless-stopped

  sample-app:
    build: ./sample-app
    ports: ["8001:8001"]
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://signoz:4318
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/app
    networks: [signoz-net]
    depends_on: [signoz, redis, postgres]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks: [signoz-net]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_medic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [signoz-net]
    ports: ["5432:5432"]
    restart: unless-stopped

  agent-medic:
    build: ./agent-medic
    ports: ["8000:8000"]
    environment:
      SIGNOZ_MCP_ENABLED: "true"
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agent_medic
      DOCKER_HOST: unix:///var/run/docker.sock
      LOG_LEVEL: INFO
      AGENT_WORKERS: "3"
      AGENT_DEDUP_WINDOW_MINUTES: "5"
      AGENT_RATE_LIMIT_PER_MINUTE: "10"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [signoz-net]
    depends_on: [signoz, ollama, postgres]
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes:
      - ollama_data:/root/.ollama
    networks: [signoz-net]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      retries: 3
    restart: unless-stopped

  web-ui:
    build: ./web-ui
    ports: ["3000:80"]
    networks: [signoz-net]
    depends_on: [agent-medic]
    restart: unless-stopped

volumes:
  signoz-data:
  pgdata:
  ollama_data:
