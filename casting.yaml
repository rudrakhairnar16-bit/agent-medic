version: "1.0"
name: agent-medic

mcp:
  spec:
    enabled: true

services:
  signoz:
    image: signoz/foundry:latest
    ports:
      - 3301:3301
      - 4318:4318
      - 4317:4317
    volumes:
      - signoz-data:/var/lib/signoz
    environment:
      - SIGNOZ_MCP_ENABLED=true

alerts:
  - name: High Error Rate
    query: sum(rate(signoz_latency_count{status_code=~"5.."}[5m])) / sum(rate(signoz_latency_count[5m])) > 0.05
    severity: critical
    webhook: http://agent-medic:8000/webhook

  - name: High CPU Usage
    query: avg(system_cpu_utilization) > 0.80
    severity: warning
    webhook: http://agent-medic:8000/webhook

  - name: Redis Connection Errors
    query: rate(redis_errors_total[5m]) > 0
    severity: critical
    webhook: http://agent-medic:8000/webhook

  - name: High Memory Usage
    query: avg(system_memory_utilization) > 0.85
    severity: warning
    webhook: http://agent-medic:8000/webhook

  - name: High Disk Usage
    query: avg(disk_usage_percent) > 0.90
    severity: warning
    webhook: http://agent-medic:8000/webhook

  - name: High Error Rate (Agent)
    query: sum(rate(agent_incidents_total{status="failed"}[5m])) > 2
    severity: warning
    webhook: http://agent-medic:8000/webhook

dashboards:
  - name: Agent MedIC — Pipeline Performance
    panels:
      - title: Incidents Processed
        type: timeseries
        query: sum(rate(agent_incidents_total[5m]))

      - title: Fix Success Rate
        type: stat
        query: sum(agent_fix_successes) / sum(agent_fix_attempts) * 100

      - title: Pipeline Stage Latency (p95)
        type: timeseries
        query: p95(agent_pipeline_duration_ms)

      - title: LLM Calls
        type: timeseries
        query: sum(rate(agent_llm_calls[5m]))

      - title: Queue Depth
        type: timeseries
        query: avg(agent_queue_depth)

      - title: Incident Resolution Rate
        type: stat
        query: sum(incidents_resolved) / sum(incidents_total) * 100

  - name: Agent MedIC — Service Health
    panels:
      - title: Error Rate by Service
        type: timeseries
        query: rate(error_count[5m]) by (service_name)

      - title: P95 Latency by Service
        type: timeseries
        query: p95(duration_ms) by (service_name)

      - title: CPU Usage by Service
        type: timeseries
        query: avg(cpu_utilization) by (service_name)

      - title: Memory Usage by Service
        type: timeseries
        query: avg(memory_usage) by (service_name)

      - title: Service Health Score
        type: stat
        query: (1 - sum(failed_requests) / sum(total_requests)) * 100

  - name: Agent MedIC — Alert Correlation
    panels:
      - title: Alert Correlation Groups
        type: table
        query: count(correlation_groups) by (root_cause)

      - title: Time Between Correlated Alerts
        type: timeseries
        query: avg(inter_alert_delay_seconds)

      - title: Top Root Causes
        type: table
        query: count(incidents) by (root_cause) | order by count desc
